# Raaed RAG Pipeline - Conda Environment
# ========================================
# Python 3.10 is chosen for maximum compatibility with PaddleOCR,
# EasyOCR, Docling, and Sentence-Transformers in a single env.
#
# Usage:
#   conda env create -f environment.yml
#   conda activate raaed
#
# To update an existing environment:
#   conda env update -f environment.yml --prune

name: raaed
channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ────────────────────────────────────────────────────────
  - python=3.10

  # ── Core system packages via conda (better binary handling) ──────
  - pip
  - git

  # ── Everything via pip (avoids conda/pip MKL linking conflicts) ──
  - pip:
      # ── PyTorch ─────────────────────────────────────────────────────
      # Install via pip to avoid iJIT_NotifyEvent MKL symbol errors.
      # CPU-only (default):
      - --extra-index-url https://download.pytorch.org/whl/cpu
      - torch>=2.1.0
      - torchvision>=0.16.0
      - torchaudio>=2.1.0
      # For GPU (CUDA 12.1), replace the index URL above with:
      #   --extra-index-url https://download.pytorch.org/whl/cu121

      # ── Web Framework ──────────────────────────────────────────────
      - fastapi==0.110.2
      - uvicorn[standard]==0.29.0
      - python-multipart==0.0.9
      - python-dotenv==1.0.1
      - pydantic-settings>=2.2.1,<3.0.0
      - aiofiles==23.2.1

      # ── Database ──────────────────────────────────────────────────
      - motor>=3.6.0,<4.0.0
      - pymongo>=4.7.0,<5.0.0
      - pydantic-mongo==2.3.0

      # ── LangChain ─────────────────────────────────────────────────
      - langchain==0.1.20
      - langchain-text-splitters>=0.0.1

      # ── LLM Providers ─────────────────────────────────────────────
      - openai>=1.40.0,<2.0.0
      - cohere==5.5.8
      - httpx>=0.24.0,<1.0.0

      # ── Core pinned dependencies (conflict prevention) ────────────
      # numpy 1.x is required for PaddleOCR compatibility
      - numpy>=1.24.0,<2.0.0
      # tokenizers must be pinned to avoid conflicts between
      # sentence-transformers, chromadb, and langchain
      - tokenizers>=0.19.0,<0.30.0

      # ── Embeddings & Vector Search ─────────────────────────────────
      - sentence-transformers>=2.7.0,<4.0.0
      - chromadb>=0.5.0,<1.0.0
      - qdrant-client>=1.9.0,<2.0.0
      - tiktoken>=0.7.0

      # ── PDF Extraction ─────────────────────────────────────────────
      - pymupdf==1.24.3
      - docling>=2.90.0
      - docling-core>=2.0.0
      - pillow>=10.0.0

      # ── OCR Engines ────────────────────────────────────────────────
      # Install PaddlePaddle FIRST (most restrictive)
      - paddlepaddle>=2.6.0
      - paddleocr>=2.8.0
      - easyocr>=1.7.0

      # ── Vision/LLM (Ollama - optional, for local models) ──────────
      - ollama>=0.3.0
